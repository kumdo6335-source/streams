<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>스트림스 - 교실 수학게임</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="title-banner">
    <div class="math-deco" aria-hidden="true">
      <span style="--c:var(--pink); --r:-8deg">×</span>
      <span style="--c:var(--green); --r:6deg">%</span>
      <span style="--c:var(--blue); --r:-5deg">÷</span>
      <span style="--c:var(--yellow-dark); --r:9deg">π</span>
      <span style="--c:var(--purple); --r:-4deg">✓</span>
      <span style="--c:var(--pink-dark); --r:7deg">+</span>
    </div>
    <h1>스트림스</h1>
    <p>교실 수학게임</p>
  </div>
  <div class="choice-row">
    <div class="choice-card" onclick="location.href='host.html'">
      <div class="emoji">🧑‍🏫</div>
      <h2>방장 (교사)</h2>
      <p>방을 만들고 게임을 진행합니다</p>
    </div>
    <div class="choice-card" onclick="location.href='player.html'">
      <div class="emoji">🎒</div>
      <h2>참가자 (학생)</h2>
      <p>코드를 입력하고 게임에 참여합니다</p>
    </div>
  </div>
</body>
</html>
